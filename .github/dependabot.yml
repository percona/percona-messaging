version: 2
updates:
  # Keep action SHAs fresh after pinning them in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
      - "Automation & CI"
    # Group updates so review stays focused and avoids PR spam.
    groups:
      github-actions-official:
        patterns:
          - "actions/*"
      github-actions-third-party:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
    commit-message:
      prefix: "chore(deps)"

  # Keep workflow validation tooling pinned and current.
  - package-ecosystem: "pip"
    directory: "/.github/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
