name: Impact Slash Commands

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  impact-ok:
    if: ${{ github.event.issue.pull_request && (startsWith(github.event.comment.body, '/impact-ok') || startsWith(github.event.comment.body, '/impact-reset') || startsWith(github.event.comment.body, '/impact-all')) && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify commenter is maintainer-level
        id: authz
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const allowed = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const assoc = context.payload.comment.author_association;
            core.setOutput("allowed", allowed.has(assoc) ? "true" : "false");

      - name: Reject unauthorized command
        if: steps.authz.outputs.allowed != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "⚠️ `/impact-ok`, `/impact-reset`, and `/impact-all` can only be used by Owner, Member, or Collaborator.",
            });

      - name: Stop when unauthorized
        if: steps.authz.outputs.allowed != 'true'
        run: exit 0

      - name: Load PR refs
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("head_ref", pr.data.head.ref);
            core.setOutput("base_ref", pr.data.base.ref);

      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ steps.pr.outputs.base_ref }}" --depth=1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/requirements/ci.txt"

      - name: Install dependencies
        run: python -m pip install -r .github/requirements/ci.txt

      - name: Merge command into waiver state
        id: merge_waiver
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-waiver-data:v1 -->";
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            let body = context.payload.comment.body.trim();
            // Alias for waive-all; normalize so the same parser handles trailing discussion text.
            if (/^\/impact-all\b/i.test(body)) {
              body = body.replace(/^\/impact-all\b\s*/i, "/impact-ok all ");
            }
            const match = body.match(/^\/impact-(ok|reset)\b\s*(.*)$/i);
            if (!match) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: "⚠️ Unsupported command format. Use `/impact-ok all`, `/impact-ok <exact path>`, `/impact-reset all`, `/impact-reset <exact path>`, or `/impact-all` (same as `/impact-ok all`).",
              });
              fs.writeFileSync("waivers.json", JSON.stringify({ all: false, paths: [], reset_paths: [] }));
              return;
            }

            const command = match[1].toLowerCase();
            const remainder = (match[2] || "").trim();
            // First line only; first token decides waive-all vs path (ignore same-line discussion after the path or "all").
            const firstLine = remainder.split(/\r?\n/)[0].trim();
            const tokens = firstLine.split(/\s+/).filter(Boolean);
            const firstToken = tokens[0] || "";
            const all = !firstToken || firstToken.toLowerCase() === "all";
            const arg = all ? "" : firstToken;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            let data = { all: false, paths: [], reset_paths: [] };
            const markerComments = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => {
                const aTime = Date.parse(a.created_at || "") || 0;
                const bTime = Date.parse(b.created_at || "") || 0;
                if (bTime !== aTime) {
                  return bTime - aTime;
                }
                return (Number(b.id) || 0) - (Number(a.id) || 0);
              });

            if (markerComments.length > 1) {
              core.warning(
                `Found ${markerComments.length} waiver marker comments; selecting latest valid payload.`
              );
            }

            for (const existing of markerComments) {
              try {
                const raw = existing.body.split(marker)[1].trim();
                const parsed = JSON.parse(raw);
                data = {
                  all: Boolean(parsed.all),
                  paths: Array.isArray(parsed.paths)
                    ? [...new Set(parsed.paths.map((p) => String(p).trim()).filter(Boolean))]
                    : [],
                  reset_paths: Array.isArray(parsed.reset_paths)
                    ? [...new Set(parsed.reset_paths.map((p) => String(p).trim()).filter(Boolean))]
                    : [],
                };
                core.info(`Loaded waiver state from comment ${existing.id}.`);
                break;
              } catch (e) {
                core.warning(`Ignoring invalid waiver JSON in comment ${existing.id}: ${e}`);
              }
            }

            const waived = new Set(data.paths || []);
            const reset = new Set(data.reset_paths || []);
            if (command === "ok" && all) {
              data = { all: true, paths: [], reset_paths: [] };
            } else if (command === "ok") {
              data.all = false;
              waived.add(arg);
              reset.delete(arg);
              data.paths = Array.from(waived);
              data.reset_paths = Array.from(reset);
            } else if (all) {
              data = { all: false, paths: [], reset_paths: [] };
            } else {
              if (data.all) {
                reset.add(arg);
                data.reset_paths = Array.from(reset);
              } else {
                waived.delete(arg);
                data.paths = Array.from(waived);
              }
            }

            const hidden = `${marker}\n${JSON.stringify(data, null, 2)}`;
            const upsertMarkerComment = require("./scripts/github/upsert_marker_comment.js");
            await upsertMarkerComment({
              github,
              core,
              owner,
              repo,
              issue_number,
              marker,
              body: hidden,
            });

            try {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: context.payload.comment.id,
                content: "rocket",
              });
            } catch (e) {
              core.info("Reaction failed (ignored): " + e);
            }

            const summary = all
              ? "`/impact-" + command + " all`"
              : "`/impact-" + command + " " + arg + "`";
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `🤖 Recorded ${summary}. Re-running Impact Check with updated waivers.`,
            });

            fs.writeFileSync("waivers.json", JSON.stringify(data));

      - name: Re-run impact check with waivers
        run: |
          python scripts/impact_check.py \
            --base "origin/${{ steps.pr.outputs.base_ref }}" \
            --head "HEAD" \
            --waiver-file waivers.json \
            --output-json impact-report.json \
            --output-md impact-report.md

      - name: Upsert impact checklist comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-check -->";
            const body = `${marker}\n` + fs.readFileSync("impact-report.md", "utf8");
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const upsertMarkerComment = require("./scripts/github/upsert_marker_comment.js");
            await upsertMarkerComment({
              github,
              core,
              owner,
              repo,
              issue_number,
              marker,
              body,
              automationFooter: {
                workflowFile: "impact-slash-commands.yml",
                eventName: context.eventName,
              },
            });

      - name: Rerun latest Impact Check workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = "${{ steps.pr.outputs.head_sha }}";
            const headRef = "${{ steps.pr.outputs.head_ref }}";

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                event: "pull_request",
                branch: headRef,
                per_page: 100,
              }
            );

            const run = runs.find(
              (r) => r.name === "Impact Check" && r.head_sha === headSha
            );

            if (!run) {
              core.warning(
                `No matching Impact Check run found for head SHA ${headSha}; skipping rerun.`
              );
              return;
            }

            await github.rest.actions.reRunWorkflow({
              owner,
              repo,
              run_id: run.id,
            });
            core.info(`Requested rerun for Impact Check run ${run.id}.`);
