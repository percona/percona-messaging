name: Content Governance Checks

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "scripts/new_file_gate.py"
      - "scripts/check_doc_coverage.py"
      - "scripts/duplicate_detector.py"
      - "scripts/governance_waiver.py"
      - ".github/workflows/content-governance-checks.yml"
      - ".github/workflows/governance-slash-commands.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  governance-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Write PR body to file
        run: |
          mkdir -p .tmp
          printf '%s' "${{ github.event.pull_request.body }}" > .tmp/pr_body.md

      - name: Build governance waiver state from hidden comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-governance-waiver-data:v1 -->";
            const pr_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr_number, per_page: 100 }
            );
            let data = { all: false, checks: [], reset_checks: [] };
            const markerComments = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => {
                const aTime = Date.parse(a.created_at || "") || 0;
                const bTime = Date.parse(b.created_at || "") || 0;
                if (bTime !== aTime) {
                  return bTime - aTime;
                }
                return (Number(b.id) || 0) - (Number(a.id) || 0);
              });

            if (markerComments.length > 1) {
              core.warning(
                `Found ${markerComments.length} governance waiver marker comments; selecting latest valid payload.`
              );
            }

            for (const found of markerComments) {
              try {
                const raw = found.body.split(marker)[1].trim();
                const parsed = JSON.parse(raw);
                data = {
                  all: Boolean(parsed.all),
                  checks: Array.isArray(parsed.checks)
                    ? [...new Set(parsed.checks.map((p) => String(p).trim()).filter(Boolean))]
                    : [],
                  reset_checks: Array.isArray(parsed.reset_checks)
                    ? [...new Set(parsed.reset_checks.map((p) => String(p).trim()).filter(Boolean))]
                    : [],
                };
                core.info(`Using governance waiver state from comment ${found.id}.`);
                break;
              } catch (e) {
                core.warning(`Ignoring invalid governance waiver JSON in comment ${found.id}: ${e}`);
              }
            }

            fs.writeFileSync("governance-waivers.json", JSON.stringify(data));

      - name: Run new-file gate
        id: new_file_gate
        continue-on-error: true
        run: |
          python scripts/new_file_gate.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --pr-body-file ".tmp/pr_body.md" \
            --waiver-file governance-waivers.json \
            --output-md "new-file-gate-report.md"

      - name: Run doc coverage check
        id: coverage
        continue-on-error: true
        run: |
          python scripts/check_doc_coverage.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --waiver-file governance-waivers.json \
            --output-md "doc-coverage-report.md"

      - name: Run duplicate detector
        id: duplicate
        continue-on-error: true
        run: |
          python scripts/duplicate_detector.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --waiver-file governance-waivers.json \
            --output-md "duplicate-detector-report.md"

      - name: Add reports to workflow summary
        if: always()
        run: |
          for file in new-file-gate-report.md doc-coverage-report.md duplicate-detector-report.md; do
            if [ -f "$file" ]; then
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upsert PR governance comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-content-governance -->";
            const files = [
              "new-file-gate-report.md",
              "doc-coverage-report.md",
              "duplicate-detector-report.md",
            ];
            const sections = files
              .filter((f) => fs.existsSync(f))
              .map((f) => fs.readFileSync(f, "utf8"));
            const footer = [
              "",
              "## Manual waiver commands (maintainers)",
              "",
              "- `/governance-ok all` or `/governance-all`",
              "- `/governance-ok new-file`, `/governance-ok doc-coverage`, `/governance-ok duplicate`",
              "- `/governance-reset all` or `/governance-reset` with the same token",
              "",
              "Waiver JSON is stored in a hidden PR comment (`messaging-governance-waiver-data:v1`), same pattern as Impact Check.",
              "",
            ].join("\n");
            const body = `${marker}\n` + sections.join("\n") + footer;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const upsertMarkerComment = require("./scripts/github/upsert_marker_comment.js");
            await upsertMarkerComment({
              github,
              core,
              owner,
              repo,
              issue_number,
              marker,
              body,
              automationFooter: {
                workflowFile: "content-governance-checks.yml",
                eventName: context.eventName,
              },
            });

      - name: Fail if any blocking governance check failed
        if: steps.new_file_gate.outcome == 'failure' || steps.coverage.outcome == 'failure' || steps.duplicate.outcome == 'failure'
        run: |
          echo "One or more governance checks failed."
          exit 1
