name: Smart Suggestions

on:
  pull_request:
    paths:
      - "**/*.md"
      - "automation/*.yml"
      - "scripts/suggest_updates.py"
      - ".github/requirements/ci.txt"
      - ".github/workflows/smart-suggestions.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/requirements/ci.txt"

      - name: Install dependencies
        run: python -m pip install -r .github/requirements/ci.txt

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Build suggestion candidates
        run: |
          python scripts/suggest_updates.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --output suggestions.json

      - name: Publish suggestion summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-smart-suggestions -->";
            const payload = JSON.parse(fs.readFileSync("suggestions.json", "utf8"));
            const suggestions = payload.suggestions || [];

            let body = `${marker}\n## Messaging Smart Suggestions\n\n`;
            if (!suggestions.length) {
              body += "No suggestion candidates were generated for this PR.\n";
            } else {
              body += "| File | Why impacted | Claim | Confidence |\n";
              body += "| --- | --- | --- | --- |\n";
              for (const s of suggestions.slice(0, 20)) {
                body += `| \`${s.file}\` | ${s.why_impacted} | ${s.claim_trigger} | ${s.confidence} |\n`;
              }
              body += "\nOnly auto-apply suggestions at high confidence with reviewer approval.\n";
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const upsertMarkerComment = require("./scripts/github/upsert_marker_comment.js");
            await upsertMarkerComment({
              github,
              core,
              owner,
              repo,
              issue_number,
              marker,
              body,
              automationFooter: {
                workflowFile: "smart-suggestions.yml",
                eventName: context.eventName,
              },
            });
