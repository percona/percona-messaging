name: Impact Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "automation/messaging-impact-map.yml"
      - "scripts/impact_check.py"
      - ".github/requirements/ci.txt"
      - ".github/workflows/impact-check.yml"
      - ".github/workflows/impact-slash-commands.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  impact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/requirements/ci.txt"

      - name: Install dependencies
        run: python -m pip install -r .github/requirements/ci.txt

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Build waiver state from hidden comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-waiver-data:v1 -->";
            const pr_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr_number, per_page: 100 }
            );
            let data = { all: false, paths: [] };
            const markerComments = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => {
                const aTime = Date.parse(a.updated_at || a.created_at || "") || 0;
                const bTime = Date.parse(b.updated_at || b.created_at || "") || 0;
                return bTime - aTime;
              });

            if (markerComments.length > 1) {
              core.warning(
                `Found ${markerComments.length} waiver marker comments; selecting latest valid payload.`
              );
            }

            let selectedId = "";
            for (const found of markerComments) {
              try {
                const raw = found.body.split(marker)[1].trim();
                const parsed = JSON.parse(raw);
                data = {
                  all: Boolean(parsed.all),
                  paths: Array.isArray(parsed.paths)
                    ? [...new Set(parsed.paths.map((p) => String(p).trim()).filter(Boolean))]
                    : [],
                };
                selectedId = String(found.id);
                break;
              } catch (e) {
                core.warning(`Ignoring invalid waiver JSON in comment ${found.id}: ${e}`);
              }
            }

            if (selectedId) {
              core.info(`Using waiver state from comment ${selectedId}.`);
            } else if (markerComments.length > 0) {
              core.warning("No valid waiver payload found; defaulting to empty waiver state.");
            }
            fs.writeFileSync("waivers.json", JSON.stringify(data));

      - name: Run impact check
        id: impact
        run: |
          python scripts/impact_check.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --waiver-file waivers.json \
            --output-json impact-report.json \
            --output-md impact-report.md

      - name: Add report to workflow summary
        if: always()
        run: cat impact-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment with impact checklist
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-check -->";
            const body = `${marker}\n` + fs.readFileSync("impact-report.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const upsertMarkerComment = require("./scripts/github/upsert_marker_comment.js");
            await upsertMarkerComment({
              github,
              core,
              owner,
              repo,
              issue_number,
              marker,
              body,
            });
