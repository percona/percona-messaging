name: Impact Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "automation/messaging-impact-map.yml"
      - "scripts/impact_check.py"
      - ".github/requirements/ci.txt"
      - ".github/workflows/impact-check.yml"
      - ".github/workflows/impact-slash-commands.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  impact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/requirements/ci.txt"

      - name: Install dependencies
        run: python -m pip install -r .github/requirements/ci.txt

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Build waiver state from hidden comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-waiver-data:v1 -->";
            const pr_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr_number, per_page: 100 }
            );
            const found = comments.find((c) => c.body && c.body.includes(marker));
            let data = { all: false, paths: [] };
            if (found) {
              try {
                const raw = found.body.split(marker)[1].trim();
                Object.assign(data, JSON.parse(raw));
              } catch (e) {
                core.warning("Ignoring invalid waiver JSON: " + e);
              }
            }
            fs.writeFileSync("waivers.json", JSON.stringify(data));

      - name: Run impact check
        id: impact
        run: |
          python scripts/impact_check.py \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" \
            --waiver-file waivers.json \
            --output-json impact-report.json \
            --output-md impact-report.md

      - name: Add report to workflow summary
        if: always()
        run: cat impact-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment with impact checklist
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-impact-check -->";
            const body = `${marker}\n` + fs.readFileSync("impact-report.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
