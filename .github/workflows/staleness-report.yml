name: Staleness Report

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  stale-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Generate staleness report
        run: |
          python scripts/staleness_report.py \
            --days 180 \
            --output-md staleness-report.md \
            --output-json staleness-report.json

      - name: Upload staleness artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staleness-report
          path: |
            staleness-report.md
            staleness-report.json

      - name: Upsert staleness issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- messaging-staleness-report -->";
            const report = fs.readFileSync("staleness-report.md", "utf8");
            const body = `${marker}\n${report}`;
            const title = "Messaging content staleness report";
            const { owner, repo } = context.repo;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", labels: "maintenance,staleness", per_page: 100 }
            );
            const existing = issues.find((i) => i.body && i.body.includes(marker));
            const noStale = report.includes("No stale canonical markdown files found.");

            if (existing && noStale) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: "No stale canonical markdown files found in the latest run. Closing this report."
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
              return;
            }

            if (noStale && !existing) {
              return;
            }

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["maintenance", "staleness"]
              });
            }
