# Spelling (typos), markdown structure (markdownlint-cli2), and URL health (lychee).
# Uses published marketplace actions; see reference/launch-and-automation-backlog.md.

name: Prose and links

on:
  pull_request:
    paths:
      - "**/*.md"
      - "_typos.toml"
      - ".lychee.toml"
      - ".markdownlint.yaml"
      - ".markdownlintignore"

permissions:
  contents: read

concurrency:
  group: prose-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: Spelling (typos)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check spelling
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1
        with:
          config: _typos.toml
          files: "**/*.md"

  markdownlint:
    name: Markdown structure (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: |
            **/*.md

  lychee:
    name: Links (lychee)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # lychee-action@v1.9.0 defaults to lychee 0.14.0, which ignored `accept` from
      # .lychee.toml (429 still failed). Pin >=0.14.1 so accept=429 is honored; see
      # https://github.com/lycheeverse/lychee/issues/1340
      - name: Check links
        uses: lycheeverse/lychee-action@22134d37a1fff6c2974df9c92a7c7e1e86a08f9c # v1.9.0
        with:
          args: --config .lychee.toml --verbose --no-progress '**/*.md'
          fail: true
          lycheeVersion: "0.14.1"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
