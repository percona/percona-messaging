# Terminology and naming linter (Vale)
# Rules mirror reference/banned-terms.md — update both when policy changes.
# https://vale.sh/

name: Terminology Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".vale.ini"
      - ".vale/**"
      - "automation/tool-versions.json"
      - ".github/workflows/terminology-check.yml"

jobs:
  check-terminology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve Vale version
        run: |
          set -euo pipefail
          VALE_VERSION="$(python3 -c 'import json; from pathlib import Path; print(json.loads(Path("automation/tool-versions.json").read_text())["vale"]["version"])')"
          echo "VALE_VERSION=${VALE_VERSION}" >> "${GITHUB_ENV}"
          echo "Using Vale v${VALE_VERSION}"

      - name: Install Vale
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -o /tmp/vale.tgz
          sudo tar -xzf /tmp/vale.tgz -C /usr/local/bin vale
          vale -v

      - name: Vale (policy; mirrors reference/banned-terms.md)
        run: vale --minAlertLevel=error .
