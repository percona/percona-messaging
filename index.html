<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Percona Messaging</title>
    <meta name="description" content="Approved source of truth for Percona messaging, built from GitHub." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="site/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        var repoName = "percona-messaging";
        var parts = window.location.pathname.split("/").filter(Boolean);
        var repoIndex = parts.indexOf(repoName);
        var basePath =
          repoIndex >= 0
            ? "/" + parts.slice(0, repoIndex + 1).join("/") + "/"
            : "/";

        window.$docsify = {
          name: "Percona Messaging",
          repo: "percona/" + repoName,
          basePath: basePath,
          homepage: "site/home.md",
          loadSidebar: true,
          subMaxLevel: 3,
          auto2top: true,
          relativePath: false,
          maxLevel: 4,
          search: {
            placeholder: "Search messaging…",
            noData: "No results found.",
            depth: 6,
          },
        };
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  </body>
</html>
