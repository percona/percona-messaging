# Spelling: https://github.com/crate-ci/typos
# Local:  cargo install typos-cli  &&  typos
# CI:     .github/workflows/prose-and-links.yml

[files]
extend-exclude = [
  "node_modules/**",
  ".git/**",
]

[default]
extend-ignore-identifiers-re = [
  "^[A-Z]{2,5}$", # e.g. API, PMM, SSPL, GDPR, QAN
]

[default.extend-identifiers]
