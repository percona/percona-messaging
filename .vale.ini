# Vale: https://vale.sh/
# Policy rules mirror reference/banned-terms.md — update both when terminology changes.

StylesPath = .vale/styles

# Block on errors only; warnings (Managed Services, em dash) still print.
MinAlertLevel = error

[formats]
md = md

[*.md]
BasedOnStyles = Percona
# List labels that use “open source” as a category name (before “:”), not a license claim.
# First capture group is the ignored block (Vale BlockIgnores requirement).
BlockIgnores = (?m)(^\s*[-*]\s+[^:\n]*?open\s+source\s*:.*$)
