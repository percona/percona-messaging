# https://github.com/DavidAnson/markdownlint
# CI: .github/workflows/prose-and-links.yml (markdownlint-cli2)
# Structural hints only (not grammar). This corpus is marketing + lists + templates.

default: true
MD001: false # heading-increment
MD013: false # line length
MD022: false # blanks-around-headings
MD024: false # duplicate headings
MD033: false # inline HTML
MD036: false # no-emphasis-as-heading (intentional short labels in copy)
MD040: false # fenced-language
MD041: false # first line heading
MD032: false # blanks-around-lists (common in dense bullet copy)
MD007: false # ul-indent (nested outline style in playbooks)
MD029: false # ol-prefix (numbered outlines with sub-bullets)
MD049: false # emphasis-style — allow *asterisks* and _underscores_ (editor defaults vary; not a product-voice signal)
# Whitespace policy (issue #59): only structural cleanliness, not prose style.
MD009: true # no-trailing-spaces (allows 2-space hard break by default)
MD012: true # no-multiple-blanks
MD047: true # single trailing newline at end of file
# Issue / PR frontmatter in .github/ uses spacing GitHub needs; do not enforce there
# (markdownlint does not read YAML front matter as special)
